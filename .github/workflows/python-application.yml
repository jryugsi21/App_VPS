name: tarea3.0

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5 # Actualizado a v5 (v3 es un poco antigua)
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Construir la imagen
      run: docker build -t ghcr.io/jryugsi21/app_vps:3.0.0 .

    - name: Login hacia GitHub Container Registry
      run: echo "${{ secrets.TOKEN_AV }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Push de la imagen a GitHub Container Registry
      run: docker push ghcr.io/jryugsi21/app_vps:3.0.0

    - name: mostrar las variables o secrets
      run: |
        echo "probando servidor ssh"
        echo "Host: ${{ secrets.VPS_HOST }}"
        echo "User: ${{ secrets.VPS_USER }}"
        echo "Port: ${{ secrets.VPS_SSH_PORT }}"
        echo "Password: ${{ secrets.VPS_PASSWORD }}"

    - name: Probar conexion ssh
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        port: ${{ secrets.VPS_SSH_PORT }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          echo "Conexión SSH exitosa"
          touch ejemplo.txt
    - name: Pasar archivos desde git al servidor
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        port: ${{ secrets.VPS_SSH_PORT }}
        password: ${{ secrets.VPS_PASSWORD }}
        source: "stack.yml,Makefile"
        target: "/home/${{ secrets.VPS_USER }}/landingb"

    - name: deplegando servicios
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        port: ${{ secrets.VPS_SSH_PORT }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
         echo "Desplegando servicios"
         cd ~/landingb
         docker pull ghcr.io/jryugsi21/app_vps:3.0.0
         docker stack deploy -c stack.yml borrar

